name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: NovelConverter-APK
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk

      - name: Generate Release Info
        run: |
          echo "## 📦 小说编码转换 APK" > ../release_notes.md
          echo "" >> ../release_notes.md
          echo "- **版本**: 1.0" >> ../release_notes.md
          echo "- **构建时间**: $(date '+%Y-%m-%d %H:%M')" >> ../release_notes.md
          echo "- **Commit**: ${{ github.sha }}" >> ../release_notes.md
          echo "" >> ../release_notes.md
          echo "### 功能" >> ../release_notes.md
          echo "- 自动检测 TXT 文件编码（UTF-8/GBK/BIG5）" >> ../release_notes.md
          echo "- 转换为纯 GBK，丢弃不支持字符" >> ../release_notes.md
          echo "- 压缩连续空行 · 分卷输出 · ZIP 打包" >> ../release_notes.md
          echo "- 离线运行，无需联网" >> ../release_notes.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
