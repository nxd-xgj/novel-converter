name: 编译 APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip openjdk-17-jdk git zip unzip libtool autoconf automake pkg-config libltdl-dev

      - name: 安装 buildozer
        run: pip3 install buildozer cython

      - name: 编译 APK
        working-directory: android
        run: buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: novel-converter-apk
          path: android/bin/*.apk
          retention-days: 90

      - name: 挂载到 Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(ls android/bin/*.apk 2>/dev/null | head -1)
          [ -n "$APK" ] && gh release upload "${{ github.event.release.tag_name }}" "$APK" --clobber
