name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download Gradle 8.5
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug,O=Android,C=US" -noprompt

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovelConverter-APK
          path: android/app/build/outputs/apk/release/*.apk
