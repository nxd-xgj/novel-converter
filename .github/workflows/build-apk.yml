name: 编译 APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 编译 APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.11
          buildozer-cmd: buildozer -v android debug
          work-dir: ./android

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: novel-converter-apk
          path: ./android/bin/*.apk
          retention-days: 90

      - name: 挂载到 Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(ls android/bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            gh release upload "${{ github.event.release.tag_name }}" "$APK" --clobber
          fi
