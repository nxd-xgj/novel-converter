<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说编码转换</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e1a;
  --card:#16162a;
  --card-hover:#1c1c36;
  --border:#2a2a4a;
  --border-light:#3a3a5a;
  --text:#e8e8f0;
  --dim:#7878a0;
  --accent:#7c5cfc;
  --accent-glow:#a78bfa;
  --green:#22d3a0;
  --amber:#f59e4b;
  --red:#ef5466;
  --blue:#60a5fa;
  --radius:10px;
  --transition:0.2s ease;
}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
}

/* ── Layout ── */
.wrap{max-width:880px;margin:0 auto;padding:24px 20px 60px}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;margin-bottom:28px;flex-wrap:wrap;gap:12px
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:38px;height:38px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 3px 12px rgba(124,92,252,.3)
}
.logo h1{font-size:18px;font-weight:700}
.logo small{font-size:11px;color:var(--dim);display:block}
.status-badge{
  font-size:12px;padding:4px 14px;border-radius:20px;
  background:var(--card);border:1px solid var(--border);
  color:var(--dim);white-space:nowrap
}
.status-badge.ok{color:var(--green);border-color:rgba(34,211,160,.3)}
.status-badge.busy{color:var(--amber);border-color:rgba(245,158,75,.3)}

/* ── Steps Bar ── */
.steps{
  display:flex;gap:0;margin-bottom:28px;
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden
}
.step{
  flex:1;padding:12px 8px;text-align:center;
  font-size:13px;color:var(--dim);position:relative;
  transition:var(--transition)
}
.step:not(:last-child)::after{
  content:'';position:absolute;right:0;top:30%;height:40%;
  width:1px;background:var(--border)
}
.step .num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  font-size:11px;font-weight:600;margin-right:6px;
  background:var(--border);color:var(--dim);transition:var(--transition);
  vertical-align:middle
}
.step.active{color:var(--text)}
.step.active .num{background:var(--accent);color:#fff}
.step.done{color:var(--green)}
.step.done .num{background:var(--green);color:#fff}
.step .label{vertical-align:middle}

/* ── Upload Area ── */
.drop-zone{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:44px 20px;text-align:center;cursor:pointer;
  transition:var(--transition);background:var(--card);
  position:relative
}
.drop-zone:hover,.drop-zone.dragover{
  border-color:var(--accent);background:rgba(124,92,252,.04)
}
.drop-zone.dragover{transform:scale(1.008)}
.drop-icon{font-size:44px;display:block;margin-bottom:10px}
.drop-zone h3{font-size:16px;margin-bottom:4px}
.drop-zone p{font-size:13px;color:var(--dim)}
.drop-tags{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.drop-tags span{
  font-size:11px;color:var(--dim);background:var(--border);
  padding:3px 10px;border-radius:12px
}
#fileInput{display:none}

/* ── Section ── */
.section{display:none;margin-top:20px}
.section.show{display:block}
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px
}
.section-title h2{font-size:15px;font-weight:600}
.section-title .count{
  font-size:12px;color:var(--dim);background:var(--card);
  padding:2px 10px;border-radius:8px
}

/* ── File List ── */
.file-list{display:flex;flex-direction:column;gap:6px}
.file-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;transition:var(--transition);
  animation:frIn .25s ease-out
}
@keyframes frIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.file-row:hover{border-color:var(--border-light)}
.file-ico{font-size:16px;flex-shrink:0;width:28px;text-align:center}
.file-body{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;font-size:11px;color:var(--dim)}
.file-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;
  display:inline-flex;align-items:center;gap:3px
}
.tag-utf8{background:rgba(96,165,250,.15);color:var(--blue)}
.tag-gbk{background:rgba(34,211,160,.12);color:var(--green)}
.tag-other{background:rgba(245,158,75,.12);color:var(--amber)}
.tag-need{background:rgba(124,92,252,.15);color:var(--accent-glow)}
.tag-ok{background:rgba(34,211,160,.12);color:var(--green)}
.tag-fix{background:rgba(245,158,75,.12);color:var(--amber)}
.tag-done{background:rgba(34,211,160,.15);color:var(--green)}
.tag-err{background:rgba(239,84,102,.12);color:var(--red)}
.tag-info{background:rgba(96,165,250,.1);color:var(--blue)}
.file-remove{
  cursor:pointer;font-size:16px;color:var(--dim);opacity:0;
  transition:var(--transition);background:none;border:none;padding:4px;line-height:1
}
.file-row:hover .file-remove{opacity:1}
.file-remove:hover{color:var(--red)}

/* ── Buttons ── */
.bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;padding:10px 22px;
  border:none;border-radius:8px;cursor:pointer;
  transition:var(--transition);font-family:inherit
}
.btn-pri{
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  color:#fff;box-shadow:0 3px 12px rgba(124,92,252,.3)
}
.btn-pri:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 18px rgba(124,92,252,.45)}
.btn-pri:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-suc{
  background:linear-gradient(135deg,#059669,var(--green));
  color:#fff;box-shadow:0 3px 12px rgba(34,211,160,.25)
}
.btn-suc:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 5px 18px rgba(34,211,160,.4)}
.btn-ghost{
  background:transparent;border:1px solid var(--border);color:var(--dim)
}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:12px}
.bar-hint{font-size:12px;color:var(--dim);margin-left:auto}

/* ── Progress ── */
.progress-wrap{display:none;margin-top:14px}
.progress-wrap.show{display:block}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .4s ease}
.progress-label{font-size:11px;color:var(--dim);margin-top:4px;text-align:right}

/* ── Summary ── */
.summary{display:none;gap:10px;margin-top:14px;flex-wrap:wrap}
.summary.show{display:flex}
.summary-card{
  flex:1;min-width:100px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center
}
.summary-card .big{font-size:26px;font-weight:700}
.summary-card .lbl{font-size:11px;color:var(--dim);margin-top:2px}
.c-convert .big{color:var(--accent-glow)}
.c-skip .big{color:var(--green)}
.c-err .big{color:var(--red)}

/* ── Result details ── */
.result-detail{display:none;margin-top:14px}
.result-detail.show{display:block}
.detail-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;margin-bottom:4px;font-size:12px
}
.detail-row .dr-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-row .dr-info{color:var(--dim);flex-shrink:0}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border);
  padding:12px 24px;border-radius:var(--radius);
  font-size:13px;z-index:999;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:tin .3s ease-out
}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Empty ── */
.empty{padding:36px;text-align:center;color:var(--dim);font-size:13px}
.empty .e-icon{font-size:36px;margin-bottom:8px}

/* ── Spinner ── */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* ── Footer ── */
.footer{text-align:center;padding:28px;font-size:11px;color:var(--dim);margin-top:40px;border-top:1px solid var(--border)}

/* ── Responsive ── */
@media(max-width:600px){
  .wrap{padding:14px 12px}
  .steps .step .label{display:none}
  .file-row{flex-wrap:wrap;padding:10px 12px}
  .bar{flex-direction:column}
  .bar .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">📖</div>
      <div>
        <h1>小说编码转换</h1>
        <small>任意编码 → 纯 GBK · 批量处理</small>
      </div>
    </div>
    <div class="status-badge" id="statusBadge">◉ 就绪</div>
  </header>

  <!-- Steps -->
  <div class="steps" id="stepsBar">
    <div class="step active" data-step="1">
      <span class="num">1</span><span class="label">上传文件</span>
    </div>
    <div class="step" data-step="2">
      <span class="num">2</span><span class="label">转换编码</span>
    </div>
    <div class="step" data-step="3">
      <span class="num">3</span><span class="label">下载结果</span>
    </div>
  </div>

  <!-- Step 1: Upload -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📂</span>
    <h3>拖拽 TXT 文件到此处</h3>
    <p>或点击选择，支持批量上传，自动识别编码</p>
    <div class="drop-tags">
      <span>UTF-8</span><span>GBK</span><span>BIG5</span><span>UTF-16</span>
    </div>
    <input type="file" id="fileInput" multiple accept=".txt">
  </div>

  <!-- File List Section -->
  <div class="section show" id="sectionFiles">
    <div class="section-title">
      <h2>📋 已上传文件</h2>
      <span class="count" id="fileCount">0 个</span>
    </div>
    <div id="fileListContainer">
      <div class="empty">
        <div class="e-icon">📄</div>
        <div>暂无文件，上传 TXT 小说开始</div>
      </div>
    </div>

    <div class="bar" id="actionBar" style="display:none">
      <button class="btn btn-pri" id="btnConvert" disabled>
        🔄 开始转换
      </button>
      <button class="btn btn-ghost btn-sm" id="btnClear">🗑 清空</button>
      <span class="bar-hint" id="actionHint"></span>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">处理中...</div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary"></div>

  <!-- Result Details -->
  <div class="result-detail" id="resultDetail">
    <div class="section-title"><h2>📄 文件处理详情</h2></div>
    <div id="detailList"></div>
    <div class="bar" id="downloadBar" style="display:none;margin-top:10px">
      <button class="btn btn-suc" id="btnDownload">📥 下载全部 (ZIP)</button>
      <button class="btn btn-ghost btn-sm" id="btnStartOver">🔄 重新开始</button>
    </div>
  </div>

</div>

<div class="footer">小说编码转换 · 纯 GBK 输出 · 适配老旧阅读设备</div>
<div id="toastRoot"></div>

<script>
/* ═══════════════════════════════════════════════════
   State
   ═══════════════════════════════════════════════════ */
const S = {
  id: null,          // session_id
  files: [],         // uploaded file info[]
  converted: false,
  converting: false,
}

const API = '/api';

/* ── Helpers ── */
const $ = id => document.getElementById(id);
const fsize = b => b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';

function toast(msg, dur=3000) {
  const el = document.createElement('div');
  el.className='toast';el.textContent=msg;
  $('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

function setStatus(text, ok=true) {
  const b = $('statusBadge');
  b.textContent = '◉ '+text;
  b.className = 'status-badge' + (ok?' ok':' busy');
}

function setSteps(n) {
  document.querySelectorAll('.step').forEach(s => {
    const i = +s.dataset.step;
    s.classList.toggle('active', i===n);
    s.classList.toggle('done', i<n);
  });
}

/* ── Session ── */
async function init() {
  try {
    const r = await fetch(API+'/session',{method:'POST'});
    const d = await r.json();
    S.id = d.session_id;
  } catch(e) {
    setStatus('服务未连接', false);
    toast('无法连接后端服务', 5000);
  }
}

/* ── Upload ── */
async function doUpload(files) {
  if (!S.id) await init();
  if (!files.length) return;

  // Filter .txt
  const txts = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.txt'));
  if (!txts.length) { toast('请选择 .txt 文件'); return; }

  setStatus('上传中...');
  const fd = new FormData();
  fd.append('session_id', S.id);
  txts.forEach(f => fd.append('files', f));

  try {
    const r = await fetch(API+'/upload', {method:'POST', body:fd});
    const d = await r.json();
    if (d.files && d.files.length) {
      // Merge with existing (avoid duplicates)
      const existing = new Set(S.files.map(x=>x.name));
      d.files.forEach(f => { if (!existing.has(f.name)) S.files.push(f); });
      renderFiles();
      toast(`已添加 ${d.files.length} 个文件`);
      setStatus(`${S.files.length} 个文件`);
    } else {
      toast('上传失败', 3000);
    }
  } catch(e) {
    toast('上传出错: '+e.message, 4000);
    setStatus('上传失败', false);
  }
}

/* ── Render ── */
function renderFiles() {
  const container = $('fileListContainer');
  const actionBar = $('actionBar');
  const btn = $('btnConvert');
  const hint = $('actionHint');

  $('fileCount').textContent = S.files.length+' 个';

  if (!S.files.length) {
    container.innerHTML = '<div class="empty"><div class="e-icon">📄</div><div>暂无文件，上传 TXT 小说开始</div></div>';
    actionBar.style.display = 'none';
    setSteps(1);
    return;
  }

  const needProcess = S.files.some(f => f.action !== 'none');
  const allDone = S.converted;

  let html = '<div class="file-list">';
  S.files.forEach((f,i) => {
    // Encoding tag
    let encTag = '';
    if (f.encoding) {
      if (f.encoding.includes('UTF')) encTag = '<span class="tag tag-utf8">UTF-8</span>';
      else if (f.encoding.includes('GBK')||f.encoding.includes('GB2312')||f.encoding.includes('GB18030'))
        encTag = '<span class="tag tag-gbk">GBK</span>';
      else encTag = '<span class="tag tag-other">'+f.encoding+'</span>';
    } else {
      encTag = '<span class="tag tag-other">未知</span>';
    }

    // Action tag
    let actTag = '';
    if (f.result) {
      if (f.result.status === 'converted') actTag = '<span class="tag tag-done">✅ 已转换</span>';
      else if (f.result.status === 'skipped') actTag = '<span class="tag tag-ok">✅ 已就绪</span>';
      else if (f.result.status === 'error') actTag = '<span class="tag tag-err">❌ 失败</span>';
    } else {
      if (f.action === 'convert') actTag = '<span class="tag tag-need">🔄 需转换</span>';
      else if (f.action === 'repair') actTag = '<span class="tag tag-fix">🔧 需修复</span>';
      else actTag = '<span class="tag tag-ok">✅ 已就绪</span>';
    }

    // Drop count
    let dropInfo = '';
    if (f.result && f.result.stats && f.result.stats.non_gbk_chars_dropped > 0) {
      dropInfo = `<span>丢弃 ${f.result.stats.non_gbk_chars_dropped} 个字符</span>`;
    }

    html += `
      <div class="file-row">
        <div class="file-ico">📄</div>
        <div class="file-body">
          <div class="file-name" title="${f.name}">${f.name}</div>
          <div class="file-meta">
            <span>${fsize(f.size)}</span>
            <div class="file-badges">${encTag} ${actTag}</div>
            ${dropInfo}
          </div>
        </div>
        <button class="file-remove" data-idx="${i}" title="移除">✕</button>
      </div>
    `;
  });
  html += '</div>';
  container.innerHTML = html;

  // Remove buttons
  container.querySelectorAll('.file-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      S.files.splice(idx, 1);
      if (S.files.length === 0) S.converted = false;
      renderFiles();
    });
  });

  // Action bar
  actionBar.style.display = 'flex';
  if (allDone) {
    btn.disabled = true;
    btn.innerHTML = '✅ 转换完成';
    hint.textContent = '处理完成，请下载';
    setSteps(3);
  } else {
    btn.disabled = false;
    btn.innerHTML = needProcess ? '🔄 开始转换' : '✅ 全部就绪，无需转换';
    btn.disabled = !needProcess;
    hint.textContent = needProcess
      ? `${S.files.filter(f=>f.action!=='none').length} 个文件需要处理`
      : '所有文件编码已正确';
    setSteps(2);
  }

  // Download bar
  const db = $('downloadBar');
  if (allDone) {
    db.style.display = 'flex';
  }
}

/* ── Convert ── */
async function startConvert() {
  const btn = $('btnConvert');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 转换中...';
  setStatus('转换中...', false);

  const pw = $('progressWrap');
  const pf = $('progressFill');
  const pl = $('progressLabel');
  pw.classList.add('show');
  pf.style.width = '10%';
  pl.textContent = '正在分析编码...';

  try {
    const r = await fetch(API+'/convert', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:S.id})
    });
    const d = await r.json();

    pf.style.width = '100%';
    pl.textContent = '转换完成 ✓';

    if (d.results) {
      S.converted = true;
      // Update files with results
      d.results.forEach(rr => {
        const f = S.files.find(x => x.name === rr.name);
        if (f) f.result = rr;
      });
      renderFiles();
      renderSummary(d.summary);
      renderDetails(d.results);

      const msg = `完成：${d.summary.converted} 个转换 · ${d.summary.skipped} 个跳过`;
      toast(msg);
      setStatus(msg);
    }
  } catch(e) {
    toast('转换失败: '+e.message, 5000);
    setStatus('转换失败', false);
  } finally {
    setTimeout(() => { pw.classList.remove('show'); }, 1500);
  }
}

function renderSummary(summary) {
  const el = $('summary');
  el.classList.add('show');
  el.innerHTML = `
    <div class="summary-card c-convert"><div class="big">${summary.converted}</div><div class="lbl">已转换</div></div>
    <div class="summary-card c-skip"><div class="big">${summary.skipped}</div><div class="lbl">已就绪</div></div>
    ${summary.error ? `<div class="summary-card c-err"><div class="big">${summary.error}</div><div class="lbl">失败</div></div>` : ''}
  `;
}

function renderDetails(results) {
  const el = $('resultDetail');
  const list = $('detailList');
  el.classList.add('show');

  list.innerHTML = results.map(r => {
    const statusIcon = r.status==='converted'?'✅':r.status==='skipped'?'⏭️':'❌';
    const info = r.status==='converted'
      ? `${r.stats.source_encoding} → GBK · 丢弃 ${r.stats.non_gbk_chars_dropped} 个字符`
      : r.status==='skipped' ? '已经是干净 GBK' : r.error || '处理出错';
    return `<div class="detail-row">
      <span>${statusIcon}</span>
      <span class="dr-name">${r.name}</span>
      <span class="dr-info">${info}</span>
    </div>`;
  }).join('');
}

function downloadZip() {
  if (!S.id) return;
  window.open(API+'/download/'+S.id, '_blank');
  toast('正在下载...');
}

function startOver() {
  S.files = [];
  S.converted = false;
  S.converting = false;
  $('summary').classList.remove('show');
  $('resultDetail').classList.remove('show');
  $('downloadBar').style.display = 'none';
  renderFiles();
  setStatus('就绪');
}

/* ── Events ── */
const dz = $('dropZone');
const fi = $('fileInput');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) doUpload(e.dataTransfer.files);
});
fi.addEventListener('change', () => {
  if (fi.files.length) doUpload(fi.files);
  fi.value = '';
});

$('btnConvert').addEventListener('click', startConvert);
$('btnDownload').addEventListener('click', downloadZip);
$('btnClear').addEventListener('click', startOver);
$('btnStartOver').addEventListener('click', startOver);

/* ── Init ── */
init();
</script>
</body>
</html>
