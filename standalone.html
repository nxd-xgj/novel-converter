<script>
/* ═══════════════════════════════════════════════════════
 * GBK 查找表：Unicode codepoint → GBK 双字节整数
 * 14287 条目，二分查找 O(log N)
 * ═══════════════════════════════════════════════════════ */
function _gbk_init(b64, count) {
  const raw = atob(b64);
  const buf = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
  const u16 = new Uint16Array(buf.buffer);
  return { cp: u16.subarray(0, count), gb: u16.subarray(count), len: count };
}

function _gbk_lookup(cp, tbl) {
  let lo = 0, hi = tbl.len - 1;
  while (lo <= hi) {
    const mid = (lo + hi) >>> 1;
    const mcp = tbl.cp[mid];
    if (mcp === cp) return tbl.gb[mid];
    if (mcp < cp) lo = mid + 1;
    else hi = mid - 1;
  }
  return 0; // not found
}

/* ═══════════════════════════════════════════════════════
 * GBK 编码
 * ═══════════════════════════════════════════════════════ */
function gbk_encode(text, tbl) {
  const parts = [];
  let dropped = 0;
  for (let i = 0; i < text.length; i++) {
    const cp = text.charCodeAt(i);
    if (cp < 0x80) { parts.push(cp); continue; }
    const gb = _gbk_lookup(cp, tbl);
    if (gb) { parts.push((gb >> 8) & 0xFF, gb & 0xFF); }
    else { dropped++; }
  }
  return { bytes: new Uint8Array(parts), dropped };
}

/* ═══════════════════════════════════════════════════════
 * 编码检测
 * ═══════════════════════════════════════════════════════ */
const DETECT_ENCS = ['gb18030','gbk','gb2312','big5','utf-8','utf-16le','utf-16be','euc-jp','shift_jis'];

function detect_encoding(raw) {
  let best = null, bestScore = 0;
  for (const enc of DETECT_ENCS) {
    try {
      const d = new TextDecoder(enc, { fatal: true });
      const t = d.decode(raw);
      const cjk = (t.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
      const score = cjk * 2 + (cjk > 0 ? t.length : 0) * 0.1;
      if (score > bestScore) { bestScore = score; best = enc; }
    } catch (e) {}
  }
  // fallback: try non-fatal utf-8
  if (!best) {
    try { new TextDecoder('utf-8').decode(raw); best = 'utf-8'; } catch (e) {}
  }
  return best || 'unknown';
}

function text_compact(text) {
  const lines = text.split(/\r?\n/);
  const out = [];
  let blank = false;
  for (const l of lines) {
    const s = l.trim();
    if (!s) { if (!blank) { out.push(''); blank = true; } continue; }
    blank = false; out.push(s);
  }
  return out.join('\r\n');
}

function text_split(text, maxBytes, tbl) {
  if (!maxBytes) return [text];
  const g = gbk_encode(text, tbl);
  if (g.bytes.length <= maxBytes) return [text];
  const paras = text.split('\r\n');
  const parts = [];
  let chunk = [], cur = 0;
  for (const p of paras) {
    const sz = gbk_encode(p, tbl).bytes.length + 2; // +2 for \r\n
    if (cur + sz > maxBytes && chunk.length > 0) {
      parts.push(chunk.join('\r\n'));
      chunk = [p]; cur = sz;
    } else { chunk.push(p); cur += sz; }
  }
  if (chunk.length) parts.push(chunk.join('\r\n'));
  return parts;
}

async function load_files(fs) {
  if (!gbkTbl) await init_table();
  for (const f of fs) {
    if (!f.name.toLowerCase().endsWith('.txt')) continue;
    const buf = await f.arrayBuffer();
    const raw = new Uint8Array(buf);
    const enc = detect_encoding(raw);
    const d = new TextDecoder(enc, { fatal: false });
    const text = d.decode(raw);
    const cjk = (text.match(/[\u4e00-\u9fff]/g) || []).length;
    files.push({ name: f.name, raw, encoding: enc, cjk, size: buf.byteLength, text });
  }
  render();
}

function render() {
  const list = $('fileList');
  if (!files.length) { list.innerHTML = ''; $('actionBar').style.display = 'none'; return; }
  $('actionBar').style.display = 'flex';
  list.innerHTML = files.map(f => {
    const cls = f.encoding.includes('utf') ? 'tag-utf8' : f.encoding.includes('big') ? 'tag-big5' : 'tag-gbk';
    const st = converted ? 'tag-ok' : 'tag-warn';
    return `<div class="file-row">
      <span class="name">${f.name}</span>
      <span class="tag ${cls}">${f.encoding}</span>
      <span class="tag ${st}">${converted ? '已转换' : '待转换'}</span>
      <span style="color:#7878a0;font-size:11px">${(f.size/1024).toFixed(1)}KB · ${f.cjk} 汉字</span>
    </div>`;
  }).join('');
  $('btnConvert').disabled = converted;
  $('btnConvert').textContent = converted ? '✓ 转换完成' : '开始转换';
}

async function convert() {
  const btn = $('btnConvert'); btn.disabled = true; btn.innerHTML = '转换中…';
  const compact = $('optCompact').checked;
  const splitMB = $('optSplit').checked ? parseInt($('optSplitMB').value) || 4 : 0;
  const progress = $('progress'); progress.style.display = 'block';
  const fill = $('progressFill'); fill.style.width = '10%';

  if (!window.JSZip) await load_jszip();
  const zip = new JSZip();
  let totalIn = 0, totalOut = 0, totalDrop = 0;

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    let text = compact ? text_compact(f.text) : f.text;
    const parts = text_split(text, splitMB * 1024 * 1024, gbkTbl);
    const base = f.name.replace(/\.txt$/i, '').replace(/[^\w\u4e00-\u9fff-]/g, '_');
    for (let j = 0; j < parts.length; j++) {
      const g = gbk_encode(parts[j], gbkTbl);
      totalIn += f.size;
      totalOut += g.bytes.length;
      totalDrop += g.dropped;
      const suffix = parts.length > 1 ? `_第${j + 1}卷` : '';
      zip.file(`${base}${suffix}.txt`, g.bytes);
    }
    fill.style.width = (10 + 90 * (i + 1) / files.length) + '%';
    await new Promise(r => setTimeout(r, 30));
  }
  fill.style.width = '100%';

  const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '小说GBK转换结果.zip'; a.click();
  URL.revokeObjectURL(url);

  $('result').innerHTML = `✅ 完成 · ${(totalIn/1048576).toFixed(1)}MB → ${(totalOut/1048576).toFixed(1)}MB · 丢弃 ${totalDrop} 个不可编码字符`;
  $('stats').innerHTML = files.length > 1
    ? files.map(f => `${f.name} (${f.encoding})`).join('<br>')
    : '';
  converted = true;
  btn.innerHTML = '✓ 转换完成';
  setTimeout(() => progress.style.display = 'none', 800);
  render();
}

function load_jszip() {
  if (window.JSZip) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('JSZip 加载失败，请检查网络'));
    document.head.appendChild(s);
  });
}

// Events
document.addEventListener('DOMContentLoaded', () => init_table());
const drop = $('drop');
const input = $('fileInput');
drop.addEventListener('click', () => input.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); load_files(e.dataTransfer.files); });
input.addEventListener('change', () => { load_files(input.files); input.value = ''; });
$('btnConvert').addEventListener('click', convert);
$('btnClear').addEventListener('click', () => { files = []; converted = false; render(); $('result').innerHTML = ''; $('stats').innerHTML = ''; });
$('optSplit').addEventListener('change', function () { $('optSplitMB').disabled = !this.checked; });
</script>
